# Build and publish C/C++ SDK as GitHub Release assets.
#
# Trigger: push a version tag (e.g. v0.1.0, v0.1.0-rc1).
# Creates a GitHub Release with per-platform tarballs containing headers + shared library.

name: Release C++

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libmosaic_ffi.so
            archive_suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            lib_name: libmosaic_ffi.so
            archive_suffix: linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            lib_name: libmosaic_ffi.dylib
            archive_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libmosaic_ffi.dylib
            archive_suffix: macos-aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build FFI library
        run: cargo build --release -p mosaic-ffi

      - name: Package tarball
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          ARCHIVE_NAME="mosaic-cpp-${VERSION}-${{ matrix.archive_suffix }}"
          mkdir -p "$ARCHIVE_NAME/lib" "$ARCHIVE_NAME/include"
          cp include/mosaic.h include/mosaic.hpp include/arrow_c_data.h "$ARCHIVE_NAME/include/"
          cp target/release/${{ matrix.lib_name }} "$ARCHIVE_NAME/lib/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "$ARCHIVE_NAME"

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: cpp-${{ matrix.archive_suffix }}
          path: "*.tar.gz"

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: cpp-*
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release $TAG" \
            --generate-notes \
            dist/*.tar.gz
