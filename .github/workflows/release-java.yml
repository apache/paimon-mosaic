# Publish the mosaic-writer Java package to Maven Central.
#
# Trigger: push a version tag (e.g. v0.1.0, v0.1.0-rc1).
# Pre-release tags (containing '-') deploy to Sonatype snapshots; release tags deploy and stage for release.
#
# Required secrets: OSSRH_USERNAME, OSSRH_PASSWORD, GPG_PRIVATE_KEY, GPG_PASSPHRASE

name: Release Java

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            native_dir: linux/x86_64
            lib_name: libmosaic_jni.so
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            native_dir: linux/aarch64
            lib_name: libmosaic_jni.so
          - os: macos-13
            target: x86_64-apple-darwin
            native_dir: macos/x86_64
            lib_name: libmosaic_jni.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            native_dir: macos/aarch64
            lib_name: libmosaic_jni.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            native_dir: windows/x86_64
            lib_name: mosaic_jni.dll
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build JNI library
        run: cargo build --release -p mosaic-jni

      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.target }}
          path: target/release/${{ matrix.lib_name }}

  publish:
    needs: build-native
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6

      - name: Download all native libraries
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: native-artifacts

      - name: Prepare native resources
        shell: bash
        run: |
          RESOURCE_DIR=java/src/main/resources/native
          mkdir -p "$RESOURCE_DIR/linux/x86_64" \
                   "$RESOURCE_DIR/linux/aarch64" \
                   "$RESOURCE_DIR/macos/x86_64" \
                   "$RESOURCE_DIR/macos/aarch64" \
                   "$RESOURCE_DIR/windows/x86_64"

          cp native-artifacts/native-x86_64-unknown-linux-gnu/libmosaic_jni.so "$RESOURCE_DIR/linux/x86_64/"
          cp native-artifacts/native-aarch64-unknown-linux-gnu/libmosaic_jni.so "$RESOURCE_DIR/linux/aarch64/"
          cp native-artifacts/native-x86_64-apple-darwin/libmosaic_jni.dylib "$RESOURCE_DIR/macos/x86_64/"
          cp native-artifacts/native-aarch64-apple-darwin/libmosaic_jni.dylib "$RESOURCE_DIR/macos/aarch64/"
          cp native-artifacts/native-x86_64-pc-windows-msvc/mosaic_jni.dll "$RESOURCE_DIR/windows/x86_64/"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release version
        working-directory: java
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Deploy to Maven Central
        working-directory: java
        run: mvn deploy -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
