# Publish the paimon-mosaic Python package to PyPI.
#
# Trigger: push a version tag (e.g. v0.1.0, v0.1.0-rc1).
# Pre-release tags (containing '-') publish to TestPyPI; release tags publish to PyPI.
#
# Token auth: add secrets PYPI_API_TOKEN / TEST_PYPI_API_TOKEN for publishing.

name: Release Python

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wheels-linux:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Inject RC version into pyproject.toml
        if: contains(github.ref, '-rc')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Convert 0.1.0-rc1 to PEP 440: 0.1.0rc1
          PEP440_VERSION=$(echo "$TAG" | sed 's/-rc/rc/')
          sed -i "s/^version = .*/version = \"${PEP440_VERSION}\"/" python/pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e
        with:
          package-dir: python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp39-manylinux_${{ matrix.arch }}"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env &&
            cargo build --release -p paimon-mosaic-ffi &&
            cp target/release/libpaimon_mosaic_ffi.so {package}/mosaic/

      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: wheelhouse/*.whl

  wheels-macos:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libpaimon_mosaic_ffi.dylib
    steps:
      - uses: actions/checkout@v6

      - name: Inject RC version into pyproject.toml
        if: contains(github.ref, '-rc')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PEP440_VERSION=$(echo "$TAG" | sed 's/-rc/rc/')
          sed -i '' "s/^version = .*/version = \"${PEP440_VERSION}\"/" python/pyproject.toml

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build native library
        run: cargo build --release -p paimon-mosaic-ffi

      - name: Copy native library into package
        run: cp target/release/${{ matrix.lib_name }} python/mosaic/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build wheel setuptools delocate

      - name: Build wheel
        working-directory: python
        run: python -m build --wheel

      - name: Repair wheel
        run: |
          delocate-wheel --require-archs arm64 -w python/dist/repaired python/dist/*.whl
          rm python/dist/*.whl
          mv python/dist/repaired/*.whl python/dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist/*.whl

  wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Inject RC version into pyproject.toml
        if: contains(github.ref, '-rc')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PEP440_VERSION=$(echo "$TAG" | sed 's/-rc/rc/')
          sed -i "s/^version = .*/version = \"${PEP440_VERSION}\"/" python/pyproject.toml

      - name: Setup Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Build native library
        run: cargo build --release -p paimon-mosaic-ffi

      - name: Copy native library into package
        shell: bash
        run: cp target/release/paimon_mosaic_ffi.dll python/mosaic/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build wheel setuptools

      - name: Build wheel
        working-directory: python
        run: python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v5
        with:
          name: wheels-windows-x86_64
          path: python/dist/*.whl

  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [wheels-linux, wheels-macos, wheels-windows]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to TestPyPI
        if: contains(github.ref, '-')
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          packages-dir: dist
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        if: ${{ !contains(github.ref, '-') }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          skip-existing: true
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
